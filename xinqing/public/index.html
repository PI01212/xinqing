<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 心晴 - 大学生心理健康陪伴助手</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 20px;
            height: 100vh;
        }

        /* 左侧聊天区域 */
        .chat-section {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .chat-header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .chat-header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 5px;
            animation: pulse 2s infinite;
        }

        .status-online { background: #4ade80; }
        .status-offline { background: #ef4444; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        #chatMessages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8fafc;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            align-items: flex-start;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 18px;
            line-height: 1.5;
            position: relative;
        }

        .message.ai .message-bubble {
            background: white;
            border: 1px solid #e2e8f0;
            border-top-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-top-right-radius: 4px;
        }

        .emotion-tag {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 10px;
            margin-left: 8px;
            vertical-align: middle;
            display: inline-block;
        }

        .emotion-positive { background: #dcfce7; color: #166534; }
        .emotion-negative { background: #fee2e2; color: #991b1b; }
        .emotion-neutral { background: #f1f5f9; color: #475569; }
        .emotion-crisis { background: #fef3c7; color: #92400e; animation: blink 1s infinite; }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .chat-input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 10px;
        }

        #userInput {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 25px;
            outline: none;
            font-size: 14px;
            transition: all 0.3s;
        }

        #userInput:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        #sendButton {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        #sendButton:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        /* 右侧仪表盘 */
        .dashboard-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .card h3 {
            color: #374151;
            margin-bottom: 15px;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 当前情绪卡片 */
        .current-mood {
            text-align: center;
            padding: 30px 20px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 16px;
            color: white;
        }

        .mood-emoji {
            font-size: 64px;
            margin-bottom: 10px;
        }

        .mood-text {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .mood-score {
            font-size: 48px;
            font-weight: bold;
            opacity: 0.9;
        }

        .mood-label {
            font-size: 14px;
            opacity: 0.8;
            margin-top: 5px;
        }

        /* 统计数据 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .stat-item {
            background: #f8fafc;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #6b7280;
            margin-top: 4px;
        }

        /* 图表容器 */
        .chart-container {
            position: relative;
            height: 200px;
        }

        /* 历史记录列表 */
        .history-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .history-item {
            padding: 12px;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .history-time {
            color: #9ca3af;
            font-size: 11px;
        }

        .history-emotion {
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 11px;
        }

        /* 加载动画 */
        .typing-indicator {
            display: none;
            padding: 12px 18px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 18px;
            border-top-left-radius: 4px;
            width: fit-content;
        }

        .typing-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            margin: 0 2px;
            animation: typing 1.4s infinite ease-in-out both;
        }

        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes typing {
            0%, 80%, 100% {
                transform: scale(0);
            }
            40% {
                transform: scale(1);
            }
        }

        /* 响应式设计 */
        @media (max-width: 1200px) {
            .container {
                grid-template-columns: 1fr;
            }
            
            .dashboard-section {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .dashboard-section {
                grid-template-columns: 1fr;
            }
        }

        /* 美化滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 左侧：聊天区域 -->
        <div class="chat-section">
            <div class="chat-header">
                <h1>🌸 心晴助手</h1>
                <p>
                    <span class="status-indicator status-offline" id="connectionStatus"></span>
                    <span id="statusText">正在连接...</span>
                </p>
            </div>

            <div id="chatMessages">
                <div class="message ai">
                    <div class="message-bubble">
                        你好！我是心晴，你的心理健康陪伴助手 🌸<br><br>
                        我可以：<br>
                        • 💬 和你聊天，倾听你的心声<br>
                        • 😊 分析你的情绪状态<br>
                        • 📚 提供专业的心理知识<br>
                        • 📊 记录和追踪你的心情变化<br><br>
                        随便和我聊聊吧，我会一直在这里陪着你~
                    </div>
                </div>
            </div>

            <div class="typing-indicator" id="typingIndicator">
                <span class="typing-dot"></span>
                <span class="typing-dot"></span>
                <span class="typing-dot"></span>
            </div>

            <div class="chat-input-area">
                <input type="text" id="userInput" placeholder="输入你想说的话..." autocomplete="off">
                <button id="sendButton" onclick="sendMessage()">发送</button>
            </div>
        </div>

        <!-- 右侧：情绪仪表盘 -->
        <div class="dashboard-section">
            <!-- 当前情绪 -->
            <div class="card current-mood">
                <div class="mood-emoji" id="moodEmoji">😊</div>
                <div class="mood-text" id="moodText">平静</div>
                <div class="mood-score" id="moodScore">0</div>
                <div class="mood-label">当前情绪指数</div>
            </div>

            <!-- 统计概览 -->
            <div class="card">
                <h3>📊 今日统计</h3>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-value" id="totalMessages">0</div>
                        <div class="stat-label">对话次数</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="avgScore">0</div>
                        <div class="stat-label">平均情绪分</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="positiveCount">0</div>
                        <div class="stat-label">积极时刻</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="crisisCount">0</div>
                        <div class="stat-label">预警次数</div>
                    </div>
                </div>
            </div>

            <!-- 情绪趋势图 -->
            <div class="card">
                <h3>📈 近期情绪趋势</h3>
                <div class="chart-container">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>

            <!-- 情绪分布图 -->
            <div class="card">
                <h3>🎭 情绪分布</h3>
                <div class="chart-container">
                    <canvas id="distributionChart"></canvas>
                </div>
            </div>

            <!-- 历史记录 -->
            <div class="card">
                <h3>📜 最近对话记录</h3>
                <div class="history-list" id="historyList">
                    <div style="text-align: center; color: #9ca3af; padding: 20px;">
                        开始对话后，这里会显示你的情绪记录
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        let ws = null;
        let userId = 'web-user-' + Date.now();
        let emotionData = [];
        let trendChart = null;
        let distributionChart = null;

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            initWebSocket();
            initCharts();
            loadSavedData();
            
            // 回车发送
            document.getElementById('userInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') sendMessage();
            });
        });

        // WebSocket连接
        function initWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}`);
            
            ws.onopen = function() {
                updateConnectionStatus(true);
                addSystemMessage('已连接到心晴助手');
                
                // 加载历史数据
                loadEmotionHistory();
            };
            
            ws.onclose = function() {
                updateConnectionStatus(false);
                addSystemMessage('连接断开，尝试重连...');
                setTimeout(initWebSocket, 3000);
            };
            
            ws.onerror = function(error) {
                console.error('WebSocket错误:', error);
            };
            
            ws.onmessage = function(event) {
                const data = JSON.parse(event.data);
                handleServerMessage(data);
            };
        }

        // 更新连接状态
        function updateConnectionStatus(connected) {
            const indicator = document.getElementById('connectionStatus');
            const text = document.getElementById('statusText');
            
            if (connected) {
                indicator.className = 'status-indicator status-online';
                text.textContent = '在线';
            } else {
                indicator.className = 'status-indicator status-offline';
                text.textContent = '离线';
            }
        }

        // 发送消息
        function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            
            if (!message || !ws || ws.readyState !== WebSocket.OPEN) return;
            
            // 显示用户消息
            addUserMessage(message);
            
            // 发送到服务器
            ws.send(JSON.stringify({
                type: 'chat',
                deviceId: userId,
                text: message,
                timestamp: new Date().toISOString()
            }));
            
            input.value = '';
            
            // 显示输入指示器
            document.getElementById('typingIndicator').style.display = 'block';
            scrollToBottom();
        }

        // 添加用户消息
        function addUserMessage(text) {
            const messagesDiv = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message user';
            messageDiv.innerHTML = `
                <div class="message-bubble">${escapeHtml(text)}</div>
            `;
            messagesDiv.appendChild(messageDiv);
            scrollToBottom();
        }

        // 处理服务器消息
        function handleServerMessage(data) {
            // 隐藏输入指示器
            document.getElementById('typingIndicator').style.display = 'none';
            
            if (data.type === 'chat' && data.reply) {
                // 显示AI回复
                addAIMessage(data.reply);
                
                // 如果有情感分析结果
                if (data.emotionAnalysis) {
                    updateEmotionDisplay(data.emotionAnalysis);
                    saveEmotionData(data.emotionAnalysis, data.reply);
                }
            } else if (data.type === 'system') {
                addSystemMessage(data.message);
            } else if (data.type === 'error') {
                addErrorMessage(data.error);
            }
        }

        // 添加AI消息
        function addAIMessage(text, emotionTag = '') {
            const messagesDiv = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ai';
            messageDiv.innerHTML = `
                <div class="message-bubble">${formatText(text)} ${emotionTag}</div>
            `;
            messagesDiv.appendChild(messageDiv);
            scrollToBottom();
        }

        // 添加系统消息
        function addSystemMessage(text) {
            const messagesDiv = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ai';
            messageDiv.innerHTML = `
                <div class="message-bubble" style="background: #f1f5f9; color: #64748b; font-size: 13px;">
                    ⚙️ ${text}
                </div>
            `;
            messagesDiv.appendChild(messageDiv);
            scrollToBottom();
        }

        // 更新情绪显示
        function updateEmotionDisplay(analysis) {
            // 更新当前情绪卡片
            const moodEmoji = document.getElementById('moodEmoji');
            const moodText = document.getElementById('moodText');
            const moodScore = document.getElementById('moodScore');
            
            moodScore.textContent = analysis.score.toFixed(1);
            
            // 根据分数设置表情和文字
            if (analysis.score >= 5) {
                moodEmoji.textContent = '😄';
                moodText.textContent = '开心';
            } else if (analysis.score >= 2) {
                moodEmoji.textContent = '🙂';
                moodText.textContent = '平静';
            } else if (analysis.score >= -2) {
                moodEmoji.textContent = '😐';
                moodText.textContent = '一般';
            } else if (analysis.score >= -5) {
                moodEmoji.textContent = '😔';
                moodText.textContent = '低落';
            } else {
                moodEmoji.textContent = '😢';
                moodText.textContent = '难过';
            }
            
            // 危机预警
            if (analysis.crisisLevel === 'urgent' || analysis.crisisLevel === 'warning') {
                document.querySelector('.current-mood').style.background = 
                    'linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%)';
            } else {
                document.querySelector('.current-mood').style.background = 
                    'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)';
            }
            
            // 更新统计
            emotionData.push({
                timestamp: new Date().toISOString(),
                ...analysis
            });
            
            updateStats();
            updateCharts();
            updateHistory();
            
            // 保存到本地存储
            saveToLocalStorage();
        }

        // 更新统计数据
        function updateStats() {
            document.getElementById('totalMessages').textContent = emotionData.length;
            
            if (emotionData.length > 0) {
                const avgScore = emotionData.reduce((sum, e) => sum + e.score, 0) / emotionData.length;
                document.getElementById('avgScore').textContent = avgScore.toFixed(1);
                
                const positiveCount = emotionData.filter(e => e.sentiment === 'positive').length;
                document.getElementById('positiveCount').textContent = positiveCount;
                
                const crisisCount = emotionData.filter(e => 
                    e.crisisLevel === 'warning' || e.crisisLevel === 'urgent'
                ).length;
                document.getElementById('crisisCount').textContent = crisisCount;
            }
        }

        // 初始化图表
        function initCharts() {
            // 趋势图
            const trendCtx = document.getElementById('trendChart').getContext('2d');
            trendChart = new Chart(trendCtx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: '情绪分数',
                        data: [],
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 4,
                        pointHoverRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            min: -10,
                            max: 10,
                            grid: { color: '#f1f5f9' }
                        },
                        x: {
                            grid: { display: false }
                        }
                    }
                }
            });
            
            // 分布图
            const distCtx = document.getElementById('distributionChart').getContext('2d');
            distributionChart = new Chart(distCtx, {
                type: 'doughnut',
                data: {
                    labels: ['积极', '中性', '消极'],
                    datasets: [{
                        data: [0, 0, 0],
                        backgroundColor: ['#4ade80', '#94a3b8', '#f87171'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom'
                        }
                    }
                }
            });
        }

        // 更新图表
        function updateCharts() {
            // 更新趋势图（最近20条）
            const recentData = emotionData.slice(-20);
            trendChart.data.labels = recentData.map(e => 
                new Date(e.timestamp).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })
            );
            trendChart.data.datasets[0].data = recentData.map(e => e.score);
            trendChart.update();
            
            // 更新分布图
            const positive = emotionData.filter(e => e.sentiment === 'positive').length;
            const neutral = emotionData.filter(e => e.sentiment === 'neutral').length;
            const negative = emotionData.filter(e => e.sentiment === 'negative').length;
            
            distributionChart.data.datasets[0].data = [
                Math.max(positive, 0),
                Math.max(neutral, 0),
                Math.max(negative, 0)
            ];
            distributionChart.update();
        }

        // 更新历史记录
        function updateHistory() {
            const historyList = document.getElementById('historyList');
            const recentData = emotionData.slice(-10).reverse();
            
            if (recentData.length === 0) {
                historyList.innerHTML = `
                    <div style="text-align: center; color: #9ca3af; padding: 20px;">
                        开始对话后，这里会显示你的情绪记录
                    </div>
                `;
                return;
            }
            
            historyList.innerHTML = recentData.map(e => `
                <div class="history-item">
                    <div>
                        <strong>${escapeHtml(e.primaryEmotion || '未知')}</strong>
                        <div class="history-time">${new Date(e.timestamp).toLocaleString('zh-CN')}</div>
                    </div>
                    <span class="history-emotion emotion-${e.sentiment}">
                        ${e.score > 0 ? '+' : ''}${e.score.toFixed(1)}
                    </span>
                </div>
            `).join('');
        }

        // 保存到本地存储
        function saveToLocalStorage() {
            try {
                localStorage.setItem('xinqing_emotion_data', JSON.stringify(emotionData));
                localStorage.setItem('xinqing_user_id', userId);
            } catch (e) {
                console.warn('无法保存到本地存储:', e);
            }
        }

        // 从本地存储加载
        function loadSavedData() {
            try {
                const savedData = localStorage.getItem('xinqing_emotion_data');
                const savedUserId = localStorage.getItem('xinqing_user_id');
                
                if (savedUserId) {
                    userId = savedUserId;
                }
                
                if (savedData) {
                    emotionData = JSON.parse(savedData);
                    updateStats();
                    updateCharts();
                    updateHistory();
                    
                    // 更新最新情绪显示
                    if (emotionData.length > 0) {
                        const latest = emotionData[emotionData.length - 1];
                        updateEmotionDisplay(latest);
                    }
                }
            } catch (e) {
                console.warn('无法从本地存储加载:', e);
            }
        }

        // 从服务器加载历史数据
        async function loadEmotionHistory() {
            try {
                const response = await fetch(`/api/emotion/history/${userId}?limit=50`);
                const result = await response.json();
                
                if (result.success && result.data) {

                    }));
